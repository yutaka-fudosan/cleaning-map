<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="清掃対象物件を確認するための専用マップ">
  <meta name="theme-color" content="#145c49">
  <title>清掃物件MAP</title>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="map-app">
    <div id="map" aria-label="清掃物件の地図"></div>

    <button id="menu-toggle" class="menu-toggle" type="button" aria-controls="menu-panel" aria-expanded="true">
      <span class="menu-icon" aria-hidden="true">☰</span>
      <span>メニュー</span>
    </button>

    <aside id="menu-panel" class="menu-panel" aria-label="清掃物件MAPメニュー">
      <div class="menu-heading">
        <div>
          <p class="menu-kicker">CLEANING PROPERTY MAP</p>
          <h1>清掃物件MAP</h1>
        </div>
        <span id="property-count" class="property-count" aria-live="polite">0件</span>
      </div>

      <form id="search-form" class="search-form" role="search">
        <label for="search-input">物件名・住所で検索</label>
        <input id="search-input" type="search" placeholder="物件名または住所" autocomplete="off">
        <div class="search-actions">
          <button class="primary-button" type="submit">検索</button>
          <button id="search-clear" class="secondary-button" type="button">検索解除</button>
        </div>
      </form>

      <fieldset class="type-filter">
        <legend>物件種別</legend>
        <div id="type-filter" class="filter-buttons">
          <button type="button" class="filter-button is-active" data-type="すべて" aria-pressed="true">すべて</button>
          <button type="button" class="filter-button" data-type="アパート" aria-pressed="false">アパート</button>
          <button type="button" class="filter-button" data-type="駐車場" aria-pressed="false">駐車場</button>
        </div>
      </fieldset>

      <div class="marker-legend" aria-label="マーカーの説明">
        <span><i class="legend-marker apartment" aria-hidden="true">建</i>アパート</span>
        <span><i class="legend-marker parking" aria-hidden="true">P</i>駐車場</span>
      </div>
    </aside>

    <div class="map-actions" aria-label="地図操作">
      <button id="location-button" class="map-action-button" type="button">
        <span class="action-icon" aria-hidden="true">◎</span>
        <span>現在地</span>
      </button>
      <button id="show-all-button" class="map-action-button" type="button">
        <span class="action-icon" aria-hidden="true">⌂</span>
        <span>全物件</span>
      </button>
    </div>

    <div id="empty-message" class="map-message" role="status" hidden>
      清掃物件がまだ登録されていません
    </div>
    <div id="no-results-message" class="map-message" role="status" hidden>
      条件に一致する清掃物件がありません
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
